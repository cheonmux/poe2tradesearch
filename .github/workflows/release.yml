name: Build and Release

on:
  # 표준 방식: 버전 태그(v0.5.3 등)를 push할 때만 릴리스.
  #   git tag v0.5.3 && git push origin v0.5.3
  push:
    tags:
      - 'v*'
  # 급할 때 GitHub Actions 탭에서 버튼으로 수동 배포(버전 직접 입력).
  workflow_dispatch:
    inputs:
      version:
        description: '릴리스 버전 (예: 0.5.3)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine Version
      id: version
      shell: pwsh
      run: |
        # 태그 push면 태그명(v0.5.3)에서 'v'를 떼고, 수동 실행이면 입력값 사용.
        if ($env:GITHUB_REF -like 'refs/tags/*') {
            $ver = $env:GITHUB_REF -replace '^refs/tags/v?', ''
        } else {
            $ver = '${{ github.event.inputs.version }}'
        }
        Write-Host "Release version: $ver"
        "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Update AssemblyInfo version
      shell: pwsh
      run: |
        # 표시 버전/파일 버전을 릴리스 버전과 일치시킴.
        $ver = '${{ steps.version.outputs.version }}'
        $path = 'Properties/AssemblyInfo.cs'
        $content = Get-Content $path -Raw
        $content = $content -replace 'AssemblyVersion\("[^"]*"\)', "AssemblyVersion(`"$ver.0`")"
        $content = $content -replace 'AssemblyFileVersion\("[^"]*"\)', "AssemblyFileVersion(`"$ver.0`")"
        Set-Content -Path $path -Value $content -NoNewline

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore Poe2TradeSearch.sln

    - name: Build Solution
      run: msbuild Poe2TradeSearch.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Prepare Release Artifacts
      shell: pwsh
      run: |
        # 배포용 임시 폴더 생성
        New-Item -ItemType Directory -Force -Path release_dist

        # 실행 파일 및 설정 파일 복사
        Copy-Item -Path "bin/Release/Poe2TradeSearch.exe" -Destination "release_dist/" -Force
        
        if (Test-Path "bin/Release/Poe2TradeSearch.exe.config") {
            Copy-Item -Path "bin/Release/Poe2TradeSearch.exe.config" -Destination "release_dist/" -Force
        }
        
        # 외부 DLL 라이브러리가 있을 경우를 대비하여 복사
        if (Test-Path "bin/Release/*.dll") {
            Copy-Item -Path "bin/Release/*.dll" -Destination "release_dist/" -Force
        }

        # 데이터 폴더 복사
        if (Test-Path "bin/Release/data") {
            Copy-Item -Path "bin/Release/data" -Destination "release_dist/" -Recurse -Force
        } else {
            # 빌드 디렉토리에 data 폴더가 없을 경우 백업으로 원본 데이터 복사
            New-Item -ItemType Directory -Force -Path release_dist/data
            Copy-Item -Path "_POE_Data/*" -Destination "release_dist/data/" -Force
        }

        # ZIP 압축 파일 생성
        Compress-Archive -Path release_dist/* -DestinationPath Poe2TradeSearch.zip

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        files: Poe2TradeSearch.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
